<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#0f1c3f"/>
  <!-- LayoutDashboard icon (Lucide style) in blue-400 (#60a5fa) -->
  <!-- Top-left large panel -->
  <rect x="5" y="5" width="9" height="13" rx="1.5" fill="#60a5fa"/>
  <!-- Top-right small panel -->
  <rect x="16" y="5" width="11" height="6" rx="1.5" fill="#60a5fa"/>
  <!-- Bottom-right panel -->
  <rect x="16" y="13" width="11" height="14" rx="1.5" fill="#60a5fa"/>
  <!-- Bottom-left small panel -->
  <rect x="5" y="20" width="9" height="7" rx="1.5" fill="#60a5fa"/>
</svg>
